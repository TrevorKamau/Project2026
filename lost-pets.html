<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lost Pets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <!-- navbar -->
     <nav>
        <a href="index.html" class="logo">🐾 PawFind</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="lost-pets.html">Lost Pets</a></li>
            <li><a href="sightings.html">Report Sighting</a></li>
            <li><a href="wall-of-hope.html">Wall of Hope</a></li>
            <li><a href="login.html" id="auth-link">Login</a></li>
            <li id="logout-btn" style="display:none;"><button onclick="logout()">Logout</button></li>
        </ul>
     </nav>

     <!-- Page header -->
      <section class="page-header">
        <h2>Lost Pets</h2>
        <p>Browse all active reports and help reunite missing pets with their families.</p>
      </section>

      <!-- Filters -->
      <section class="listings-page">
    <div class="filters">
        <input type="text" id="searchName" class="filter-input"
               placeholder="Search by name..." oninput="filterPets()">

        <input type="text" id="searchBreed" class="filter-input"
               placeholder="Search by breed..." oninput="filterPets()">

        <input type="text" id="searchArea" class="filter-input"
               placeholder="Search by area..." oninput="filterPets()">

        <select id="filterSpecies" class="filter-select" onchange="filterPets()">
            <option value="all">All species</option>
            <option value="Dog">Dog</option>
            <option value="Cat">Cat</option>
            <option value="Rabbit">Rabbit</option>
            <option value="Bird">Bird</option>
            <option value="Other">Other</option>
        </select>

        <label class="filter-label">Lost from:
            <input type="date" id="filterDateFrom" class="filter-input" onchange="filterPets()">
        </label>

        <label class="filter-label">Lost to:
            <input type="date" id="filterDateTo" class="filter-input" onchange="filterPets()">
        </label>

        <button onclick="clearFilters()" class="btn-secondary">Clear Filters</button>
    </div>

    <div class="pet-grid" id="all-pets-grid">
        <p style="color: #6b7280;">Loading pet reports...</p>
    </div>
</section>

       <script src="js/main.js"></script>
</body>
</html>
