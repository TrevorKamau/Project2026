<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width-device-width, initial-scale=1.0"/>
    <title>Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <!-- navbar -->
     <nav>
        <a href="index.html" class="logo">🐾 PawFind</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="lost-pets.html">Lost Pets</a></li>
            <li><a href="sightings.html">Report Sighting</a></li>
            <li><a href="login.html" id="auth-link">Login</a></li>
        </ul>
     </nav>

     <!-- Register form -->
      <section class="auth-page">
        <div class="auth-card">

            <h2>Create an account</h2>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" placeholder="First name" />
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" placeholder="Last name" />
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" />
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" placeholder="e.g. 087 123 4567" />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Choose a password" />
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <!-- Check both password match before submitting -->
                 <input type="password" id="confirmPassword" placeholder="Repeat your password" />
            </div>

            
             <button class="btn-submit" style="width: 100%;" onclick="Register()">Create Account</button>

             <!-- Link back to login -->
              <p class="auth-switch">Already have an account? <a href="login.html">Login here</a></p>
        </div>
      </section>

      <script src="js/main.js"></script>
</body>
</html>
