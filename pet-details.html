<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pet Details - PawFind</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <nav>
            <a href="index.html" class="logo">🐾 PawFind</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="lost-pets.html">Lost Pets</a></li>
                <li><a href="login.html" id="auth-link">Login</a></li>
            <li id="logout-btn" style="display:none;"><button onclick="logout()">Logout</button></li>
            </ul>
        </nav>

        <section class="details-container">
            <div id="pet-details-content">
                <p>Loading details...</p>
            </div>

            <hr>

            <div class="sighting-section">
                <h3>Spotted this pet? Help the owner!</h3>
                <form id="sightingForm">
                    <div class="form-row">
                        <input type="text" id="reporterName" placeholder="Your Name (Optional)">
                        <input type="text" id="reporterContact" placeholder="Phone or Email">
                    </div>

                    <div class="location-box" style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <input type="text" id="sightingLocation" placeholder="Where did you see them?" style="flex: 1;">
                        <button type="button" onclick="getLocation()" class="btn-location">📍 Pin GPS</button>
                    </div>

                    <input type="hidden" id="lat">
                    <input type="hidden" id="lng">

                    <textarea id="sightingDescription" placeholder="Description (e.g. wearing a red collar)" style="width: 100%; height: 80px;"></textarea>

                    <button type="button" onclick="submitSighting()" class="btn-primary">Submit Sighting</button>
                </form>
                
                <hr>

                    <div class="follow-section">
                        <h3>Follow this post</h3>
                        <p>Get email updates when there are new sightings or changes.</p>
                        <div class="form-row">
                            <input type="email" id="followEmail" placeholder="Enter your email">
                            <button type="button" onclick="followPost()" class="btn-primary">Follow</button>
                            <button type="button" onclick="unfollowPost()" class="btn-secondary">Unfollow</button>
                        </div>
                    </div>
                <hr>

                <div id="sightings-list">
                    <h4>Recent Sightings</h4>
                    <div id="sightings-container">
                        <p>No sightings have been reported yet.</p>
                    </div>
                </div>
            </div>

            <br>
            <a href="index.html" class="btn-secondary">Back to Home</a>
        </section>

        <script src="js/main.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", function() {
                loadPetDetails();
                const urlParams = new URLSearchParams(window.location.search);
                const petId = urlParams.get('id');
                if(petId) {
                    loadSightings(petId);
                }
            });
        </script>
    </body>
</html>
