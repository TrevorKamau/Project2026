<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <!-- navbar -->
     <nav>
        <a href="index.html" class="logo">🐾 PawFind</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="lost-pets.html">Lost Pets</a></li>
            <li><a href="sightings.html">Report Sighting</a></li>
            <li><a href="login.html" class="active" id="auth-link">Login</a></li>
        </ul>
     </nav>

     <!-- Login form -->
      <section class="auth-page">
        <div class="auth-card">

            <h2>Welcome back</h2>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Your password" />
            </div>

            
             <button class="btn-submit" style="width: 100%;" onclick="handleLogin()">Login</button>


              <p class="auth-switch">Don't have an account? <a href="register.html">Register</a></p>
        </div>
      </section>
      
      <script src="js/main.js"></script>
</body>
</html>
